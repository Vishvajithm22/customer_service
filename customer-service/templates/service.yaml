apiVersion: v1
kind: Service

metadata:
  name: {{ .Release.Name }}-fastapi-service
  labels:
    app: fastapi

spec:
  type: {{ .Values.service.type }}

  selector:
    app: fastapi

  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      nodePort: {{ .Values.service.nodePort }}