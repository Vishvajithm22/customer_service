name: FastAPI CI

on:
  push:
    branches:
      - master

jobs:
  build:

    runs-on: self-hosted

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Installation
        run: |
          python --version
          pip --version

      - name: Verify Docker
        run: docker --version

      - name: Build Docker Image
        run: |
          docker build -t fastapi-ci .
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker tag fastapi-ci alien00784400/fastapi-customer-service:latest
          docker push alien00784400/fastapi-customer-service:latest

      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install customer-service ./customer-service -f customer-service/values.yaml
          
